<script>
// -------------------- FIREBASE --------------------
const firebaseConfig = {
    apiKey: "AIzaSyAlIHZ0jFxJtuNU2bmDKalyVPQV3Amx-jk",
    authDomain: "equiprime-hr.firebaseapp.com",
    projectId: "equiprime-hr",
    storageBucket: "equiprime-hr.firebasestorage.app",
    messagingSenderId: "613422898397",
    appId: "1:613422898397:web:e825bbf5d78905bcf20f34"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// -------------------- GLOBALS --------------------
let currentUser = null, currentUserData = null, currentUserRole = null;
let allEmployees = [], allRequests = [], allAttendance = [], allPayslips = [], allAnnouncements = [], guardWeeklySchedules = [];
let currentFilter = { department: 'all', status: 'all', leaveType: 'all' };

// Critical system accounts – these will always be active
const SYSTEM_ADMIN_EMAILS = ["hrd@equiprime.ph", "mod.rom@equiprime.ph", "mod.dex@equiprime.ph"];
const fullPrivilegedEmails = [...SYSTEM_ADMIN_EMAILS];
const resetAuthorizedEmail = "mod.rom@equiprime.ph";
const editAuthorizedEmails = ["mod.rom@equiprime.ph", "mod.dex@equiprime.ph"];

// -------------------- AUTO-CREATE SYSTEM ADMIN RECORDS --------------------
async function ensureSystemAdminRecord(user) {
    const email = user.email;
    if (!SYSTEM_ADMIN_EMAILS.includes(email)) return false;
    
    const docRef = db.collection('employees').doc(user.uid);
    const doc = await docRef.get();
    if (!doc.exists) {
        // Determine role based on email
        let role = "admin";
        if (email === "hrd@equiprime.ph") role = "hr";
        else if (email === "mod.rom@equiprime.ph" || email === "mod.dex@equiprime.ph") role = "moderator";
        
        const name = email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        const empData = {
            name: name,
            email: email,
            dept: "HR Department",
            role: role,
            status: "active",
            pin: "0000",
            leaveBalance: 15,
            createdAt: new Date().toISOString()
        };
        await docRef.set(empData);
        await db.collection('users').doc(user.uid).set({
            uid: user.uid,
            name: name,
            email: email,
            role: role,
            department: "HR Department",
            leaveBalance: 15,
            status: "active"
        });
        // Grant approver permissions (they are admins)
        await grantApproverPermissions(user.uid, role, "HR Department");
        console.log(`Auto-created system admin record for ${email}`);
        return true;
    } else {
        // Ensure status is 'active' and not tampered with
        if (doc.data().status !== 'active') {
            await docRef.update({ status: 'active' });
            console.log(`Reset inactive status for system admin ${email}`);
        }
        return true;
    }
}

// -------------------- GRANT / REVOKE APPROVER PERMISSIONS (DYNAMIC) --------------------
async function grantApproverPermissions(employeeId, role, department) {
    const approverRoles = ['admin', 'supervisor', 'manager', 'hr', 'moderator'];
    if (!approverRoles.includes(role)) return;
    const deptRef = db.collection('departmentApprovers').doc(department);
    const doc = await deptRef.get();
    if (doc.exists) {
        const current = doc.data().secondaryApprovers || [];
        if (!current.includes(employeeId)) {
            await deptRef.update({ secondaryApprovers: firebase.firestore.FieldValue.arrayUnion(employeeId) });
        }
    } else {
        await deptRef.set({
            secondaryApprovers: [employeeId],
            finalApprover: "hrd@equiprime.ph"
        });
    }
}

async function revokeApproverPermissions(employeeId, department) {
    // System admins should never be revoked
    const emp = allEmployees.find(e => e.id === employeeId);
    if (emp && SYSTEM_ADMIN_EMAILS.includes(emp.email)) return;
    const deptRef = db.collection('departmentApprovers').doc(department);
    const doc = await deptRef.get();
    if (doc.exists) {
        await deptRef.update({
            secondaryApprovers: firebase.firestore.FieldValue.arrayRemove(employeeId)
        });
    }
}

async function getApproverForDepartment(department, stage) {
    const deptDoc = await db.collection('departmentApprovers').doc(department).get();
    if (!deptDoc.exists) return { email: "hrd@equiprime.ph", isFallback: true };
    const data = deptDoc.data();
    if (stage === 'secondary') {
        const secondaryIds = data.secondaryApprovers || [];
        for (let id of secondaryIds) {
            const empDoc = await db.collection('employees').doc(id).get();
            if (empDoc.exists && empDoc.data().status === 'active') {
                return { email: empDoc.data().email, isFallback: false };
            }
        }
        return { email: data.finalApprover || "hrd@equiprime.ph", isFallback: true };
    } else {
        return { email: data.finalApprover || "hrd@equiprime.ph", isFallback: false };
    }
}

    const empSnap = await db.collection('employees').get();

    const attSnap = await db.collection('attendance').get();

    const paySnap = await db.collection('payslips').get();

    const annSnap = await db.collection('announcements').get();

    const guardSnap = await db.collection('guardWeeklySchedules').get();
    guardWeeklySchedules = guardSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    refreshDashboard();
    updateLastUpdatedTime();
}

    if (!editAuthorizedEmails.includes(currentUser?.email)) { alert("Only moderators can edit."); return; }
    if (SYSTEM_ADMIN_EMAILS.includes(emp.email) && currentUser?.email !== resetAuthorizedEmail) {
        alert("System admin accounts cannot be edited by non‑mod.rom users.");
        return;
    }
    document.getElementById('editEmpId').value = emp.id;
    document.getElementById('editEmpName').value = emp.name;
    document.getElementById('editEmpEmail').value = emp.email || '';
    document.getElementById('editEmpDept').value = emp.dept;
    document.getElementById('editEmpRole').value = emp.role;
    document.getElementById('editEmpStatus').value = emp.status || 'active';
    document.getElementById('editLeaveBalance').value = emp.leaveBalance || 15;
    document.getElementById('editEmpPin').value = emp.pin || '';
    document.getElementById('editEmpPassword').value = '';
    // Disable status dropdown for system admins
    const statusSelect = document.getElementById('editEmpStatus');
    if (SYSTEM_ADMIN_EMAILS.includes(emp.email)) {
        statusSelect.disabled = true;
        statusSelect.value = 'active';
    } else {
        statusSelect.disabled = false;
    }
    openModal('editEmployeeModal');
}

async function saveEmployeeEdit() {
    const id = document.getElementById('editEmpId').value;
    const name = document.getElementById('editEmpName').value;
    const email = document.getElementById('editEmpEmail').value;
    const dept = document.getElementById('editEmpDept').value;
    const role = document.getElementById('editEmpRole').value;
    let newStatus = document.getElementById('editEmpStatus').value;
    const leaveBalance = parseInt(document.getElementById('editLeaveBalance').value);
    const pin = document.getElementById('editEmpPin').value;
    const newPassword = document.getElementById('editEmpPassword').value;
    
    // Prevent deactivating system admins
    if (SYSTEM_ADMIN_EMAILS.includes(email) && newStatus !== 'active') {
        alert("System admin accounts cannot be deactivated.");
        newStatus = 'active';
    }
    
    if (!name || !dept || !role) { alert("Fill required fields"); return; }
    const oldEmp = allEmployees.find(e => e.id === id);
    const oldStatus = oldEmp ? oldEmp.status : 'active';
    const empRef = db.collection('employees').doc(id);
    const updateData = { name, email, dept, role, status: newStatus, leaveBalance, pin };
    await empRef.update(updateData);
    const idx = allEmployees.findIndex(e => e.id === id);
    if (idx !== -1) allEmployees[idx] = { ...allEmployees[idx], ...updateData };
    
    if (oldStatus !== newStatus && !SYSTEM_ADMIN_EMAILS.includes(email)) {
        if (newStatus === 'active') {
            await grantApproverPermissions(id, role, dept);
        } else {
            await revokeApproverPermissions(id, dept);
        }
    }
    // Update users collection
    const userQuery = await db.collection('users').where('email', '==', email).get();
    userQuery.forEach(doc => db.collection('users').doc(doc.id).update({ name, role, department: dept, status: newStatus }));
    if (newPassword && newPassword.trim() !== "") {
        try { await auth.sendPasswordResetEmail(email); alert(`Password reset email sent to ${email}.`); } catch (err) { alert("Could not send reset email."); }
    }
    closeModal('editEmployeeModal');
    refreshDashboard();
    alert("Employee updated.");
}

// -------------------- LOGIN WITH AUTO-CREATION --------------------
async function loginWithEmail() {
    const email = document.getElementById('loginEmail').value;
    const pwd = document.getElementById('loginPassword').value;
    const errDiv = document.getElementById('authError');
    try {
        const cred = await auth.signInWithEmailAndPassword(email, pwd);
        const user = cred.user;
        // Ensure system admin record exists
        await ensureSystemAdminRecord(user);
        
        const doc = await db.collection('employees').doc(user.uid).get();
        if (doc.exists) {
            currentUserData = doc.data();
            if (currentUserData.status !== "active" && !SYSTEM_ADMIN_EMAILS.includes(email)) {
                await auth.signOut();
                alert("Account inactive. Contact HR.");
                return;
            }
            currentUserRole = currentUserData.role;
        } else {
            await auth.signOut();
            alert("Employee record not found. Please contact HR.");
            return;
        }
        currentUser = user;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('welcomeName').innerText = currentUserData.name.split(' ')[0];
        document.getElementById('userName').innerText = currentUserData.name;
        document.getElementById('userInitials').innerText = currentUserData.name.split(' ').map(n=>n[0]).join('');
        document.getElementById('mobileUserInitials').innerText = currentUserData.name.split(' ').map(n=>n[0]).join('');
        document.getElementById('mobileUserName').innerText = currentUserData.name.split(' ')[0];
        const displayRole = currentUserRole === 'admin' ? 'Administrator' : (currentUserRole === 'supervisor' ? 'Supervisor' : (currentUserRole === 'manager' ? 'Manager' : (currentUserRole === 'hr' ? 'HR Admin' : 'Employee')));
        document.getElementById('welcomeSubtitle').innerHTML = displayRole;
        document.getElementById('userRoleDisplay').innerText = displayRole;
        renderNavigation();
        await loadAllData();
        await loadAnnouncements();
        await refreshMyAttendanceTab();
        if (fullPrivilegedEmails.includes(currentUser.email)) populateYearDropdown();
        const resetContainer = document.getElementById('resetButtonContainer');
        if (resetContainer && currentUser.email === resetAuthorizedEmail) resetContainer.innerHTML = `<button onclick="resetAllSystemData()" class="bg-red-600 text-white px-5 py-2 rounded-xl w-full">⚠️ Reset All System Data (PIN required)</button>`;
        else resetContainer.innerHTML = "";
        switchTab('dashboard');
    } catch (e) { errDiv.innerText = e.message; errDiv.classList.remove('hidden'); }
}
